<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Umepay · Bomberos</title>
<meta name="theme-color" content="#2d5a3d"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,sans-serif;color:#1a1a1a;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#dfe6dc}
.topbar{background:#9a2f2f;padding:14px 16px;display:flex;align-items:center;gap:10px;z-index:10}
.topbar h1{color:#fff;font-size:17px;font-weight:500;flex:1}
.btn-back{color:#f0c9c9;font-size:22px;background:none;border:none;text-decoration:none;cursor:pointer}
.buscador{background:#fff;padding:10px 12px;display:flex;flex-direction:column;gap:8px;border-bottom:0.5px solid #e0e0d8}
.buscador select,.buscador input{padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;width:100%}
.fila{display:flex;gap:8px}
.fila input{flex:1}
.fila button{background:#9a2f2f;color:#fff;border:none;border-radius:8px;padding:0 18px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
#aviso{font-size:12px;color:#9a2f2f;display:none}
#map{flex:1;background:#cdd9cd}
.leyenda{background:#f5f5f0;padding:8px 14px;display:flex;gap:14px;flex-wrap:wrap;font-size:12px;align-items:center;border-top:0.5px solid #e0e0d8}
.ll{display:inline-flex;align-items:center;gap:6px}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.2)}
.popup b{font-size:15px;color:#2d5a3d;display:block;margin-bottom:4px}
.popup .row{font-size:13px;padding:1px 0}
.popup .k{color:#888}
.leaflet-popup-content{margin:10px 12px}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn-back" href="index.html"><i class="ti ti-arrow-left"></i></a>
  <h1>Bomberos · Emergencias</h1>
</div>
<div class="buscador">
  <select id="barrio">
    <option value="">Barrio...</option>
    <option>Nogales Altos</option><option>Nogales Bajos</option><option>Aldea</option><option>Espinillos</option><option>Acacias</option><option>Paraje de los Gauchos</option><option>9 Lomas</option><option>7 Lomas</option><option>3 Ríos</option><option>Castaños</option>
  </select>
  <div class="fila">
    <input id="lote" type="number" min="1" placeholder="N° de lote"/>
    <button onclick="buscar()">Buscar</button>
  </div>
  <div id="aviso"></div>
</div>
<div id="map"></div>
<div class="leyenda">
  <span class="ll"><span class="dot" style="background:#1d6fb8"></span> Agua</span>
  <span class="ll"><span class="dot" style="background:#2d5a3d"></span> Parcela Umepay</span>
  <span class="ll"><span class="dot" style="background:#9a2f2f"></span> Parcela buscada</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CENTRO=[-31.8543,-64.7210];
const CAPAS=[
  {archivo:'data/parcelas.geojson',        nombre:'Parcelas',        clase:'parcela',  visible:true},
  {archivo:'data/puntos.geojson',          nombre:'Puntos de agua',  clase:'aguaPunto',visible:true},
  {archivo:'data/lineas.geojson',          nombre:'Mangueras',       clase:'aguaLinea',visible:true},
  {archivo:'data/ejes_calles_int.geojson', nombre:'Calles',          clase:'calle',    visible:true}
];

const map=L.map('map').setView(CENTRO,16);
map.createPane('parcelasPane'); map.getPane('parcelasPane').style.zIndex=350;
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);

function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}
function estiloParcela(f){
  const p=f.properties||{};
  const ume=String(p.Umepay||'').trim().toLowerCase()==='si';
  const reg=String(p.EstadoCat||'').trim().toLowerCase()==='registrado';
  const base=ume?'#2d5a3d':'#9a9e93';
  return {color:base,weight:1.4,dashArray:reg?null:'5,4',fillColor:base,fillOpacity:ume?0.30:0.10};
}
const RESALTADO={color:'#9a2f2f',weight:3,dashArray:null,fillColor:'#e24b4a',fillOpacity:0.55};
function colorAgua(v){v=norm(v);
  if(v==='t'||v.includes('bifurc'))return '#444';
  if(v.includes('acopio'))return '#2e9e54'; if(v.includes('casa'))return '#e24b4a';
  if(v.includes('distrib'))return '#1d6fb8'; if(v.includes('valv'))return '#e24b4a';
  if(v.includes('1/2'))return '#e24b4a'; if(v.includes('3/4'))return '#22b8cf';
  if(v.includes('tanq'))return '#1d6fb8'; return '#1d9e75';
}
function valCat(p){p=p||{};return p.Descripcio||p.Manguera||p.codigo||p.Codigo||'';}
function popup(p){
  p=p||{};
  const titulo = p.NumParc!=null ? (p.Barrio?p.Barrio+' · ':'')+'Lote '+p.NumParc : (valCat(p)||'Detalle');
  const campos=[['Barrio',p.Barrio],['Titular',p.Titular_es],['Estado',p.EstadoCat]];
  const filas=campos.filter(([k,v])=>v&&String(v).toUpperCase()!=='NULL')
    .map(([k,v])=>`<div class="row"><span class="k">${k}:</span> ${v}</div>`).join('');
  return `<div class="popup"><b>${titulo}</b>${filas}</div>`;
}

let indiceParcelas={}, capaParcelas=null, resaltada=null;

function agregar(gj,clase,nombre,overlays,visible){
  const opts={onEachFeature:(f,l)=>{
    if(clase==='aguaPunto'||clase==='aguaLinea'||clase==='parcela') l.bindPopup(popup(f.properties));
    if(clase==='parcela'){
      const p=f.properties||{};
      if(p.NumParc!=null) indiceParcelas[norm(p.Barrio)+'|'+String(p.NumParc).trim()]=l;
    }
  }};
  if(clase==='parcela'){opts.style=estiloParcela;opts.pane='parcelasPane';}
  else if(clase==='aguaPunto'){opts.pointToLayer=(f,ll)=>L.circleMarker(ll,{radius:7,color:'#fff',weight:2,fillColor:colorAgua(valCat(f.properties)),fillOpacity:1});}
  else if(clase==='aguaLinea'){opts.style=f=>({color:colorAgua(valCat(f.properties)),weight:3});}
  else if(clase==='calle'){opts.style={color:'#8a5a2b',weight:2.5};}
  const capa=L.geoJSON(gj,opts);
  overlays[nombre]=capa; if(visible)capa.addTo(map);
  if(clase==='parcela')capaParcelas=capa;
  return capa;
}

function buscar(){
  const b=document.getElementById('barrio').value;
  const lote=document.getElementById('lote').value.trim();
  const av=document.getElementById('aviso'); av.style.display='none';
  if(!b||!lote){av.textContent='Elegí barrio y número de lote.';av.style.display='block';return;}
  const l=indiceParcelas[norm(b)+'|'+lote];
  if(!l){av.textContent='No se encontró el lote '+lote+' en '+b+'.';av.style.display='block';return;}
  if(resaltada) resaltada.setStyle(estiloParcela(resaltada.feature));
  l.setStyle(RESALTADO); resaltada=l;
  map.fitBounds(l.getBounds(),{maxZoom:18,padding:[40,40]});
  l.openPopup();
}

async function init(){
  const overlays={}; let bounds=null,n=0;
  for(const c of CAPAS){
    try{
      const r=await fetch(c.archivo,{cache:'no-store'}); if(!r.ok)throw 0;
      const gj=await r.json(); agregar(gj,c.clase,c.nombre,overlays,c.visible); n++;
      if(c.clase==='parcela'){
        const ume=L.geoJSON(gj,{filter:f=>String((f.properties||{}).Umepay||'').trim().toLowerCase()==='si'});
        const bb=ume.getBounds(); bounds=bb.isValid()?bb:capaParcelas.getBounds();
      }
    }catch(e){}
  }
  if(n===0){
    agregar(MUESTRA,'parcela','Parcelas',overlays,true);
    bounds=L.geoJSON(MUESTRA).getBounds();
  }
  L.control.layers(null,overlays,{collapsed:true}).addTo(map);
  if(bounds&&bounds.isValid())map.fitBounds(bounds.pad(0.05),{maxZoom:16});
}

const MUESTRA={type:"FeatureCollection",features:[
  {type:"Feature",properties:{Barrio:"Aldea",NumParc:1,Umepay:"Si",EstadoCat:"Registrado"},geometry:{type:"Polygon",coordinates:[[[-64.7220,-31.8535],[-64.7212,-31.8535],[-64.7212,-31.8542],[-64.7220,-31.8542],[-64.7220,-31.8535]]]}},
  {type:"Feature",properties:{Barrio:"Aldea",NumParc:2,Umepay:"Si",EstadoCat:"SinRegistrar"},geometry:{type:"Polygon",coordinates:[[[-64.7212,-31.8535],[-64.7204,-31.8535],[-64.7204,-31.8542],[-64.7212,-31.8542],[-64.7212,-31.8535]]]}}
]};

init();
</script>
</body>
</html>
